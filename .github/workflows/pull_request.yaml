name: Pull Request Workflow for Code changes

on:
  pull_request:
    branches:
      - master
      - 'v**'
    paths:
      - '**'
      - '!.markdownlint.yaml'
      - '!.vale.ini'
      - '!deployments/kubernetes/chart/reloader/**'

env:
  DOCKER_FILE_PATH: Dockerfile
  DOCKER_UBI_FILE_PATH: Dockerfile.ubi
  KUBERNETES_VERSION: "1.30.0"
  KIND_VERSION: "0.31.0"
  REGISTRY: ghcr.io
  RELOADER_EDITION: oss

# Default to no GITHUB_TOKEN permissions; each job opts into the minimum it needs.
permissions: {}

jobs:
  qa:
    permissions:
      contents: read
      pull-requests: write # reusable workflow posts languagetool review comments
    uses: stakater/.github/.github/workflows/pull_request_doc_qa.yaml@3dfb835dba6b596fe32e1d0f5eadbb4a3a139a1c # v0.0.163
    with:
      MD_CONFIG: .github/md_config.json
      DOC_SRC: README.md
      MD_LINT_CONFIG: .markdownlint.yaml

  build:

    permissions:
      contents: read
      pull-requests: write
      issues: write

    runs-on: ubuntu-latest
    name: Build
    steps:
    - name: Check out code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        ref: ${{github.event.pull_request.head.sha}}
        fetch-depth: 0

    # Setting up helm binary
    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
      with:
        version: v3.20.2

    - name: Helm chart unit tests
      uses: d3adb5/helm-unittest-action@850bc76597579183998069830d5fa8c3ef0ea34a # v2
      with:
        charts: deployments/kubernetes/chart/reloader
        helm-version: v3.20.2
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version-file: 'go.mod'
        check-latest: true
        cache: false

    - name: Create timestamp
      id: prep
      run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT


    # Get highest tag and remove any suffixes with '-'
    - name: Get Highest tag
      id: highest_tag
      run: |
        highest=$(git tag -l --sort -version:refname | head -n 1)
        echo "tag=${highest%%-*}" >> $GITHUB_OUTPUT

    - name: Install Dependencies
      run: |
        make install

    - name: Run golangci-lint
      run: make lint

    - name: Helm Lint
      run: |
        cd deployments/kubernetes/chart/reloader
        helm lint

    - name: Install kubectl
      run: |
        curl -LO "https://storage.googleapis.com/kubernetes-release/release/v${KUBERNETES_VERSION}/bin/linux/amd64/kubectl"
        sudo install ./kubectl /usr/local/bin/ && rm kubectl
        kubectl version --client=true

    - name: Install Kind
      run: |
        curl -L -o kind https://github.com/kubernetes-sigs/kind/releases/download/v${KIND_VERSION}/kind-linux-amd64
        sudo install ./kind /usr/local/bin && rm kind
        kind version
        kind version | grep -q ${KIND_VERSION}

    - name: Create Kind Cluster and Setup E2E Dependencies
      run: KIND_CLUSTER=kind make e2e-setup

    - name: Run unit tests
      run: make test

    - name: Run E2E tests
      run: KIND_CLUSTER=kind make e2e

    - name: Run quick A/B load tests
      uses: ./.github/actions/loadtest
      with:
        old-ref: ${{ github.event.pull_request.base.sha }}
        # new-ref defaults to current checkout (PR branch)
        scenarios: 'S1,S4,S6'
        test-type: 'quick'
        kind-cluster: 'kind'  # Use the existing cluster created above
        post-comment: 'true'
        pr-number: ${{ github.event.pull_request.number }}

    - name: Generate Tags
      id: generate_tag
      run: |
        sha=${{ github.event.pull_request.head.sha }}
        tag="SNAPSHOT-PR-${{ github.event.pull_request.number }}-${sha:0:8}"
        ubi_tag="SNAPSHOT-PR-${{ github.event.pull_request.number }}-UBI-${sha:0:8}"
        echo "GIT_TAG=$(echo ${tag})" >> $GITHUB_OUTPUT
        echo "GIT_UBI_TAG=$(echo ${ubi_tag})" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Generate image repository path for ghcr registry
      run: |
        echo GHCR_IMAGE_REPOSITORY=${{env.REGISTRY}}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

    # To identify any broken changes in dockerfiles or dependencies

    - name: Build Docker Image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ${{ env.DOCKER_FILE_PATH  }}
        pull: true
        push: false
        build-args: |
          VERSION=merge-${{ steps.generate_tag.outputs.GIT_TAG }}
          COMMIT=${{github.event.pull_request.head.sha}}
          BUILD_DATE=${{ steps.prep.outputs.created }}
          EDITION=${{ env.RELOADER_EDITION }}
          BUILD_PARAMETERS=${{ env.BUILD_PARAMETERS }}
        
        platforms: linux/amd64,linux/arm,linux/arm64
        tags: |
          ${{ env.GHCR_IMAGE_REPOSITORY }}:${{ steps.generate_tag.outputs.GIT_TAG }}
        labels: |
          org.opencontainers.image.source=${{ github.event.repository.clone_url }}
          org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Build Docker UBI Image
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ${{ env.DOCKER_UBI_FILE_PATH  }}
        pull: true
        push: false
        build-args: |
          VERSION=merge-${{ steps.generate_tag.outputs.GIT_UBI_TAG }}
          COMMIT=${{github.event.pull_request.head.sha}}
          BUILD_DATE=${{ steps.prep.outputs.created }}
          EDITION=${{ env.RELOADER_EDITION }}
          BUILD_PARAMETERS=${{ env.BUILD_PARAMETERS }}
          BUILDER_IMAGE=${{ env.GHCR_IMAGE_REPOSITORY }}:${{ steps.highest_tag.outputs.tag }}
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.GHCR_IMAGE_REPOSITORY }}:${{ steps.generate_tag.outputs.GIT_UBI_TAG }}
        labels: |
          org.opencontainers.image.source=${{ github.event.repository.clone_url }}
          org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}
